rules:
  - id: cognigy.axios-inline-request-without-timeout
    languages:
      - typescript
      - javascript
    severity: ERROR
    message: Outbound axios calls in Cognigy extensions must set a bounded timeout.
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-400"
    pattern-either:
      - patterns:
          - pattern: 'axios({ ... })'
          - pattern-not: 'axios({ ..., timeout: $TIMEOUT, ... })'
      - pattern: 'axios.get($URL)'
      - pattern: 'axios.delete($URL)'
      - pattern: 'axios.head($URL)'
      - pattern: 'axios.options($URL)'
      - pattern: 'axios.post($URL, $BODY)'
      - pattern: 'axios.put($URL, $BODY)'
      - pattern: 'axios.patch($URL, $BODY)'
      - patterns:
          - pattern: 'axios.get($URL, { ... })'
          - pattern-not: 'axios.get($URL, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.delete($URL, { ... })'
          - pattern-not: 'axios.delete($URL, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.head($URL, { ... })'
          - pattern-not: 'axios.head($URL, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.options($URL, { ... })'
          - pattern-not: 'axios.options($URL, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.post($URL, $BODY, { ... })'
          - pattern-not: 'axios.post($URL, $BODY, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.put($URL, $BODY, { ... })'
          - pattern-not: 'axios.put($URL, $BODY, { ..., timeout: $TIMEOUT, ... })'
      - patterns:
          - pattern: 'axios.patch($URL, $BODY, { ... })'
          - pattern-not: 'axios.patch($URL, $BODY, { ..., timeout: $TIMEOUT, ... })'

  - id: cognigy.knowledge-source-description-from-url-or-path
    languages:
      - typescript
      - javascript
    severity: ERROR
    message: Knowledge Source descriptions should be label-like; move exact URLs and paths to metadata.
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-20"
    pattern-regex: 'description\s*:\s*[^,\n]*(webUrl|\.path)'

  - id: cognigy.config-url-outbound-fetch-review
    languages:
      - typescript
      - javascript
    severity: WARNING
    message: Review outbound fetches that use a Cognigy config URL; validate allowed schemes and trusted sources.
    metadata:
      category: security
      confidence: MEDIUM
      cwe: "CWE-918"
    pattern-either:
      - pattern: 'axios.get(config.$FIELD, ...)'
      - pattern: 'axios.get(requiredText(config.$FIELD, ...), ...)'
      - pattern: 'axios({ ..., url: config.$FIELD, ... })'

  - id: cognigy.secret-like-value-in-console-output
    languages:
      - typescript
      - javascript
    severity: WARNING
    message: Review console output that mentions secret-like fields; redact tokens and client secrets from logs.
    metadata:
      category: security
      confidence: MEDIUM
      cwe: "CWE-532"
    pattern-regex: 'console\.(log|error|warn|info)\([^;\n]*(clientSecret|client_secret|refreshToken|refresh_token|access_token|Authorization)'

  - id: cognigy.empty-custom-descriptor-arrays-review
    languages:
      - typescript
      - javascript
    severity: WARNING
    message: Review empty custom descriptor arrays on Cognigy connectors; descriptor shape drift can break Cognigy rendering.
    metadata:
      category: correctness
      confidence: MEDIUM
    pattern-regex: '\b(sections|form)\s*:\s*\[\s*\]'
